[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# B = bugbear, C90 = mccabe, E/W = pycodestyle, F = pyflakes, I = isort,
# UP = pyupgrade, SIM = flake8-simplify
select = ["E", "W", "F", "C90", "B", "I", "UP", "SIM"]
ignore = [
    "E203",  # whitespace before ':' — conflicts with the formatter
    "E501",  # line length — enforced by the formatter
]

[tool.ruff.lint.mccabe]
max-complexity = 18

[tool.ruff.lint.isort]
lines-after-imports = 2
