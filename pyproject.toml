[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# B = bugbear, C90 = mccabe, E/W = pycodestyle, F = pyflakes, I = isort,
# UP = pyupgrade, SIM = flake8-simplify
select = ["E", "W", "F", "C90", "B", "I", "UP", "SIM"]
ignore = [
    "E203",  # whitespace before ':' (handled by the formatter)
    "E266",  # too many leading '#' for block comment
    "E501",  # line too long (handled by the formatter)
    "F403",  # 'from module import *' used
    "F541",  # f-string without any placeholders
    "E702",  # multiple statements on one line (semicolon)
    "E731",  # do not assign a lambda expression
    "E741",  # ambiguous variable name
]

[tool.ruff.lint.mccabe]
max-complexity = 18

[tool.ruff.lint.isort]
lines-after-imports = 2
