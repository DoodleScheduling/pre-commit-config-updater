repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
      # Skip templated YAML (Helm chart templates, *.tmpl.yaml) that isn't valid YAML.
      exclude: \.tmpl\.ya?ml$|(^|/)templates/.*\.ya?ml$
    - id: check-toml
    - id: check-merge-conflict
    - id: check-added-large-files
    - id: debug-statements
-   repo: https://github.com/DoodleScheduling/pre-commit-config-updater
    rev: v20
    hooks:
    - id: pre-commit-config-updater
      additional_dependencies: [tomlkit]
      always_run: true
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
    - id: ruff-check
      args: [--fix]
    - id: ruff-format
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
    - id: gitleaks
